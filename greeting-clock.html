<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Greeting Clock</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Playfair Display', Georgia, serif;
}

.widget {
  text-align: center;
  line-height: 1;
}

.greeting {
  font-size: 13px;
  font-weight: 400;
  font-style: italic;
  letter-spacing: 0.1em;
  color: #b8a99a;
  margin-bottom: 5px;
  opacity: 0;
  animation: fadeIn 1.2s ease forwards;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.greeting-icon {
  font-style: normal;
  font-size: 12px;
  line-height: 1;
}

.time {
  font-size: 26px;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: #7a6e68;
  opacity: 0;
  animation: fadeIn 1.2s ease 0.2s forwards;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="widget">
  <div class="greeting" id="greeting"></div>
  <div class="time" id="time"></div>
</div>

<script>
const GREETINGS = {
  morning:   { text: 'Good Morning',   icon: '☕︎' },
  afternoon: { text: 'Good Afternoon', icon: '☀︎' },
  evening:   { text: 'Good Evening',   icon: '⏾' },
  night:     { text: 'Good Night',     icon: '✩' },
};

function getGreeting(h) {
  if (h >= 5  && h < 12) return GREETINGS.morning;
  if (h >= 12 && h < 17) return GREETINGS.afternoon;
  if (h >= 17 && h < 21) return GREETINGS.evening;
  return GREETINGS.night;
}

function tick() {
  const now  = new Date();
  const h    = now.getHours();
  const min  = now.getMinutes();
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12  = h % 12 || 12;
  const m    = String(min).padStart(2, '0');
  const g    = getGreeting(h);

  document.getElementById('greeting').innerHTML =
    `<span class="greeting-icon">${g.icon}</span><span>${g.text}</span>`;
  document.getElementById('time').textContent = `${h12}:${m} ${ampm}`;
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
