<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Side Panel</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
}

.panel {
  width: 120px;
  height: 420px;
  border-radius: 22px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  border: 1.5px solid #e8e8e8;
  background: #fafafa;
  transition: border-color 0.2s;
}

.panel:hover { border-color: #d4d4d4; }

.panel img,
.panel video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 20px;
}

.empty-state {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 16px;
  text-align: center;
}

.empty-icon {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.panel:hover .empty-icon { background: #e8e8e8; }

.empty-icon svg {
  width: 18px;
  height: 18px;
  stroke: #c0c0c0;
  fill: none;
  stroke-width: 1.6;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.empty-text {
  font-size: 10px;
  font-weight: 600;
  color: #cccccc;
  letter-spacing: 0.04em;
  line-height: 1.5;
}

.remove-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.226);
  border: 1px solid rgba(0,0,0,0.08);
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: #aaaaaae0;
  line-height: 1;
  transition: background 0.15s, color 0.15s;
  z-index: 10;
}
.remove-btn:hover { background: #fff; color: #888; }
.panel.has-media .remove-btn { display: flex; }
</style>
</head>
<body>

<div class="panel" id="panel">

  <div class="empty-state" id="empty">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21,15 16,10 5,21"/>
      </svg>
    </div>
    <span class="empty-text">Tap to add image or GIF</span>
  </div>

  <button class="remove-btn" id="remove-btn" title="Remove image">✕</button>

</div>

<input type="file" id="file-input" accept="image/*" style="display:none"/>

<script>
const panel     = document.getElementById('panel');
const empty     = document.getElementById('empty');
const removeBtn = document.getElementById('remove-btn');
const fileInput = document.getElementById('file-input');

let mediaEl = null;

panel.addEventListener('click', e => {
  if (e.target === removeBtn || removeBtn.contains(e.target)) return;
  if (!panel.classList.contains('has-media')) {
    fileInput.click();
  }
});

fileInput.addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;

  if (mediaEl) { mediaEl.remove(); mediaEl = null; }

  const reader = new FileReader();
  reader.onload = ev => {
    const isGif = file.type === 'image/gif';

    if (isGif) {
      mediaEl = document.createElement('img');
    } else {
      mediaEl = document.createElement('img');
    }

    mediaEl.src = ev.target.result;
    panel.insertBefore(mediaEl, empty);
    empty.style.display = 'none';
    panel.classList.add('has-media');
  };
  reader.readAsDataURL(file);
  this.value = '';
});

removeBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (mediaEl) { mediaEl.remove(); mediaEl = null; }
  empty.style.display = '';
  panel.classList.remove('has-media');
});
</script>
</body>
</html>
